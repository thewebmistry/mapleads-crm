<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | MapLeads CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                            400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
                            800: '#1e40af', 900: '#1e3a8a',
                        },
                        secondary: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1',
                            400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155',
                            800: '#1e293b', 900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
        .gradient-icon {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
    <script>
        // Initialize dark mode BEFORE page renders
        (function() {
            const html = document.documentElement;
            const savedTheme = localStorage.getItem('darkMode');
            
            if (savedTheme === 'true' || (!('darkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                html.classList.add('dark');
            }
        })();
    </script>
</head>
<body class="bg-gray-50 dark:bg-secondary-900 text-gray-900 dark:text-gray-100 min-h-screen">
    
    <!-- Header -->
    <header class="sticky top-0 z-30 bg-white/90 dark:bg-secondary-800/90 backdrop-blur-xl backdrop-blur-md border-b border-white/20 dark:border-secondary-700/50 shadow-soft">
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center space-x-4">
                <button id="sidebar-toggle-mobile" class="lg:hidden p-2 rounded-xl hover:bg-secondary-50 dark:hover:bg-secondary-800/50 transition-all duration-300">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="flex items-center">
                    <div class="h-8 w-8 rounded-xl bg-gradient-to-r from-primary-600 to-purple-600 flex items-center justify-center shadow-glow">
                        <i class="fas fa-map-marker-alt text-white"></i>
                    </div>
                    <span class="ml-3 text-xl font-bold bg-gradient-to-r from-primary-600 to-purple-600 bg-clip-text text-transparent">MapLeads</span>
                    <span class="ml-1 text-sm font-medium text-primary-600 dark:text-primary-400">CRM</span>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <button id="dark-mode-toggle" class="p-2 rounded-xl hover:bg-secondary-50 dark:hover:bg-secondary-800/50 transition-all duration-300">
                    <i id="dark-mode-icon" class="fas fa-moon"></i>
                </button>
                <div class="h-8 w-8 rounded-full bg-gradient-to-r from-primary-500 to-purple-500 flex items-center justify-center ring-2 ring-primary-500/50 hover:ring-primary-500 transition-all duration-200 shadow-glow">
                    <i class="fas fa-user text-white"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="flex h-[calc(100vh-4rem)]">
        <!-- Sidebar -->
        <aside id="sidebar" class="hidden lg:flex flex-col bg-white/90 dark:bg-secondary-800 dark:bg-secondary-800/90 backdrop-blur-xl border-r border-gray-200/50 dark:border-gray-700/50 w-64 transition-all duration-300 shadow-sidebar">
            <nav class="flex-1 px-4 py-6 space-y-1">
                <a href="dashboard.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-gray-700 dark:text-gray-300 hover:bg-secondary-50 dark:hover:bg-secondary-800/50 transition-all duration-200 group hover:translate-x-1">
                    <i class="fas fa-tachometer-alt w-5 mr-3 group-hover:scale-110 transition-transform"></i>Dashboard
                </a>
                <a href="leads.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-gray-700 dark:text-gray-300 hover:bg-secondary-50 dark:hover:bg-secondary-800/50 transition-all duration-200 group hover:translate-x-1">
                    <i class="fas fa-users w-5 mr-3 group-hover:scale-110 transition-transform"></i>Leads
                </a>
                <a href="kanban.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-gray-700 dark:text-gray-300 hover:bg-secondary-50 dark:hover:bg-secondary-800/50 transition-all duration-200 group hover:translate-x-1">
                    <i class="fas fa-columns w-5 mr-3 group-hover:scale-110 transition-transform"></i>Kanban
                </a>
                <a href="analytics.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-gray-700 dark:text-gray-300 hover:bg-secondary-50 dark:hover:bg-secondary-800/50 transition-all duration-200 group hover:translate-x-1">
                    <i class="fas fa-chart-line w-5 mr-3 group-hover:scale-110 transition-transform"></i>Analytics
                </a>
                <a href="payments.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-gray-700 dark:text-gray-300 hover:bg-secondary-50 dark:hover:bg-secondary-800/50 transition-all duration-200 group hover:translate-x-1">
                    <i class="fas fa-credit-card w-5 mr-3 group-hover:scale-110 transition-transform"></i>Payments
                </a>
                <a href="settings.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl bg-gradient-to-r from-primary-50 to-transparent dark:from-primary-900/20 border-l-4 border-primary-500 text-primary-700 dark:text-primary-300 group transition-all duration-200 hover:translate-x-1">
                    <i class="fas fa-cog w-5 mr-3 group-hover:scale-110 transition-transform"></i>Settings
                </a>
            </nav>
            <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                <button id="sidebar-toggle-desktop" class="w-full flex items-center justify-center p-2 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-secondary-50 dark:hover:bg-secondary-800/50 transition-all duration-200">
                    <i class="fas fa-chevron-left"></i><span class="ml-2 text-sm">Collapse</span>
                </button>
            </div>
        </aside>

        <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden hidden"></div>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-4 md:p-6 bg-gradient-to-br from-gray-50/50 to-secondary-50/50 dark:from-gray-900/50 dark:to-secondary-900/50">
            <div class="max-w-7xl mx-auto">
                
                <!-- Page Header -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold bg-gradient-to-r from-primary-600 to-purple-600 bg-clip-text text-transparent">Settings</h1>
                    <p class="text-gray-500 dark:text-gray-400 mt-2">Manage your agency preferences and configuration with premium controls.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    
                    <!-- 1. Agency Profile -->
                    <div class="bg-white/90 dark:bg-secondary-800/90 backdrop-blur-xl rounded-2xl p-6 shadow-card-premium border border-white/20 dark:border-secondary-700/50 transition-all duration-300 hover:-translate-y-1 hover:shadow-glow">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200">Agency Profile</h2>
                            <div class="p-3 rounded-xl bg-gradient-to-r from-primary-500/10 to-purple-500/10 text-primary-600 dark:text-primary-300">
                                <i class="fas fa-building text-xl gradient-icon"></i>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-500 dark:text-gray-400 mb-2">Agency Name</label>
                                <input type="text" value="MapLeads CRM" class="w-full px-4 py-3 bg-secondary-50 dark:bg-secondary-900/50 border border-secondary-200 dark:border-secondary-700 rounded-xl focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 outline-none transition-all duration-300">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-500 dark:text-gray-400 mb-2">Owner Name</label>
                                <input type="text" value="John Doe" class="w-full px-4 py-3 bg-secondary-50 dark:bg-secondary-900/50 border border-secondary-200 dark:border-secondary-700 rounded-xl focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 outline-none transition-all duration-300">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-500 dark:text-gray-400 mb-2">Email</label>
                                <input type="email" value="admin@mapleads.com" class="w-full px-4 py-3 bg-secondary-50 dark:bg-secondary-900/50 border border-secondary-200 dark:border-secondary-700 rounded-xl focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 outline-none transition-all duration-300">
                            </div>
                        </div>
                    </div>

                    <!-- 2. Communication -->
                    <div class="bg-white/90 dark:bg-secondary-800/90 backdrop-blur-xl rounded-2xl p-6 shadow-card-premium border border-white/20 dark:border-secondary-700/50 transition-all duration-300 hover:-translate-y-1 hover:shadow-glow">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200">Communication</h2>
                            <div class="p-3 rounded-xl bg-gradient-to-r from-green-500/10 to-teal-500/10 text-green-600 dark:text-green-300">
                                <i class="fab fa-whatsapp text-xl gradient-icon"></i>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-500 dark:text-gray-400 mb-2">WhatsApp Number</label>
                                <input type="text" value="+91 98765 43210" class="w-full px-4 py-3 bg-secondary-50 dark:bg-secondary-900/50 border border-secondary-200 dark:border-secondary-700 rounded-xl focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 outline-none transition-all duration-300">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-500 dark:text-gray-400 mb-2">Default Message</label>
                                <textarea rows="3" class="w-full px-4 py-3 bg-secondary-50 dark:bg-secondary-900/50 border border-secondary-200 dark:border-secondary-700 rounded-xl focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 outline-none text-sm transition-all duration-300">Hi! Thank you for your interest in MapLeads CRM...</textarea>
                            </div>
                        </div>
                    </div>

                    <!-- 3. Appearance -->
                    <div class="bg-white/90 dark:bg-secondary-800/90 backdrop-blur-xl rounded-2xl p-6 shadow-card-premium border border-white/20 dark:border-secondary-700/50 transition-all duration-300 hover:-translate-y-1 hover:shadow-glow">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200">Appearance</h2>
                            <div class="p-3 rounded-xl bg-gradient-to-r from-yellow-500/10 to-orange-500/10 text-yellow-600 dark:text-yellow-300">
                                <i class="fas fa-palette text-xl gradient-icon"></i>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between p-4 bg-secondary-50 dark:bg-secondary-900/50 rounded-xl border border-secondary-200 dark:border-secondary-700 transition-all duration-300 hover:border-primary-500">
                                <div class="flex items-center">
                                    <i class="fas fa-moon text-gray-500 mr-3"></i>
                                    <span class="font-medium text-gray-800 dark:text-gray-200">Dark Mode</span>
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="settings-dark-toggle" class="sr-only peer">
                                    <div class="w-12 h-6 bg-gray-300 dark:bg-gray-700 rounded-full peer peer-checked:bg-gradient-to-r peer-checked:from-primary-600 peer-checked:to-purple-600 transition-all duration-300"></div>
                                    <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-300 peer-checked:translate-x-6"></div>
                                </label>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-secondary-50 dark:bg-secondary-900/50 rounded-xl border border-secondary-200 dark:border-secondary-700 transition-all duration-300 hover:border-primary-500">
                                <div class="flex items-center">
                                    <i class="fas fa-compact-disc text-gray-500 mr-3"></i>
                                    <span class="font-medium text-gray-800 dark:text-gray-200">Compact Sidebar</span>
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" class="sr-only peer">
                                    <div class="w-12 h-6 bg-gray-300 dark:bg-gray-700 rounded-full peer peer-checked:bg-gradient-to-r peer-checked:from-primary-600 peer-checked:to-purple-600 transition-all duration-300"></div>
                                    <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-300 peer-checked:translate-x-6"></div>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- 4. Districts -->
                    <div class="bg-white/90 dark:bg-secondary-800/90 backdrop-blur-xl rounded-2xl p-6 shadow-card-premium border border-white/20 dark:border-secondary-700/50 col-span-1 md:col-span-2 lg:col-span-3 transition-all duration-300 hover:-translate-y-1 hover:shadow-glow">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200">Serviceable Districts</h2>
                            <button class="text-sm bg-gradient-to-r from-primary-600 to-purple-600 hover:from-primary-700 hover:to-purple-700 text-white px-4 py-2.5 rounded-xl font-medium shadow-lg transition-all duration-300 hover:-translate-y-0.5 hover:shadow-glow flex items-center gap-2">
                                <i class="fas fa-plus"></i> Add District
                            </button>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                            <!-- District Item -->
                            <div class="relative group bg-gradient-to-r from-primary-500/10 to-purple-500/10 p-4 rounded-xl border border-primary-200 dark:border-primary-800 flex items-center justify-between hover:scale-105 transition-all duration-300 hover:shadow-glow">
                                <span class="text-sm font-medium text-gray-800 dark:text-gray-200">Ranchi</span>
                                <button class="text-gray-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-all duration-300 hover:scale-110">
