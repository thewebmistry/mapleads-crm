<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                            400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
                            800: '#1e40af', 900: '#1e3a8a',
                        },
                        secondary: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1',
                            400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155',
                            800: '#1e293b', 900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
        .gradient-icon {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
    <style>
        .shadow-card-premium { box-shadow: 0 4px 25px -5px rgba(0,0,0,0.1), 0 10px 30px -5px rgba(0,0,0,0.04); }
        .shadow-glow { box-shadow: 0 0 20px rgba(99,102,241,0.4); }

        /* Custom CSS Animations */
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gradient-border {
            position: relative;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(135deg, #667eea, #764ba2) border-box;
            border: 2px solid transparent;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .glow {
            box-shadow: 0 0 20px rgba(99,102,241,0.5);
        }

        .transition-all-smooth {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tab Panel Styles - Enhanced */
        .tab-panel {
            opacity: 0;
            transform: translateY(8px);
            height: 0;
            overflow: hidden;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        height 0.3s ease;
            pointer-events: none;
        }
        .tab-panel.active {
            opacity: 1;
            transform: translateY(0);
            height: auto;
            overflow: visible;
            pointer-events: all;
            display: block;
        }
        .tab-button.active {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                        0 0 20px rgba(99, 102, 241, 0.6);
            position: relative;
            z-index: 1;
        }
        .tab-button.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.8);
        }
        
        /* Hide scrollbar for horizontal scrolling */
        .scrollbar-hide {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;     /* Firefox */
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;             /* Chrome, Safari, Opera */
        }
        
        /* Mobile responsive tabs */
        @media (max-width: 768px) {
            .tab-button {
                padding-left: 1rem !important;
                padding-right: 1rem !important;
                padding-top: 0.75rem !important;
                padding-bottom: 0.75rem !important;
                font-size: 0.875rem;
                border-radius: 9999px;
                min-width: auto;
                flex: 0 1 auto;
            }
            .tab-button i {
                margin-right: 0.5rem;
            }
            .tab-button.active::after {
                width: 40%;
                bottom: -1px;
                height: 2px;
            }
        }
        
        /* Smooth transition for tab buttons */
        .tab-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
    </style>
    <script>
        // Initialize dark mode BEFORE page renders
        (function() {
            const html = document.documentElement;
            const savedTheme = localStorage.getItem('darkMode');
            
            if (savedTheme === 'true' || (!('darkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                html.classList.add('dark');
            }
        })();
    </script>
</head>

    <!-- JavaScript -->
    <script>
        // Dark Mode Toggle
        const darkModeToggle = document.getElementById('dark-mode-toggle');
        const darkModeIcon = document.getElementById('dark-mode-icon');
        const html = document.documentElement;

        darkModeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('darkMode', isDark);
            darkModeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        });

        // Sidebar Toggle
        const sidebarToggleMobile = document.getElementById('sidebar-toggle-mobile');
        const sidebarToggleDesktop = document.getElementById('sidebar-toggle-desktop');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        sidebarToggleMobile.addEventListener('click', () => {
            sidebar.classList.toggle('hidden');
            sidebarOverlay.classList.toggle('hidden');
        });

        sidebarToggleDesktop.addEventListener('click', () => {
            sidebar.classList.toggle('hidden');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.add('hidden');
            sidebarOverlay.classList.add('hidden');
        });

        // Color picker sync
        const primaryColorPicker = document.getElementById('primary-color');
        const primaryColorText = document.getElementById('primary-color-text');
        const accentColorPicker = document.getElementById('accent-color');
        const accentColorText = document.getElementById('accent-color-text');

        if (primaryColorPicker && primaryColorText) {
            primaryColorPicker.addEventListener('input', (e) => {
                primaryColorText.value = e.target.value;
            });
            primaryColorText.addEventListener('input', (e) => {
                if (/^#[0-9A-F]{6}$/i.test(e.target.value)) {
                    primaryColorPicker.value = e.target.value;
                }
            });
        }

        if (accentColorPicker && accentColorText) {
            accentColorPicker.addEventListener('input', (e) => {
                accentColorText.value = e.target.value;
            });
            accentColorText.addEventListener('input', (e) => {
                if (/^#[0-9A-F]{6}$/i.test(e.target.value)) {
                    accentColorPicker.value = e.target.value;
                }
            });
        }

        // Form save handlers
        document.querySelectorAll('button[type="button"]').forEach(button => {
            if (button.textContent.includes('Save')) {
                button.addEventListener('click', () => {
                    const originalText = button.innerHTML;
                    button.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Saving...';
                    button.disabled = true;
                    
                    setTimeout(() => {
                        button.innerHTML = '<i class="fas fa-check mr-2"></i>Saved!';
                        setTimeout(() => {
                            button.innerHTML = originalText;
                            button.disabled = false;
                        }, 1500);
                    }, 800);
                });
            }
        });

        // Enhanced Tab Switching Functionality with Smooth Transitions
        document.addEventListener('DOMContentLoaded', function() {
            const tabButtons = document.querySelectorAll('.tab-button');
            const tabPanels = document.querySelectorAll('.tab-panel');
            const mobileDots = document.querySelectorAll('.mobile-dot');
            
            // Function to switch tab with smooth transitions
            function switchTab(tabId) {
                // First, fade out active panel
                const currentActivePanel = document.querySelector('.tab-panel.active');
                if (currentActivePanel) {
                    currentActivePanel.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
                    currentActivePanel.style.opacity = '0';
                    currentActivePanel.style.transform = 'translateY(8px)';
                    
                    setTimeout(() => {
                        currentActivePanel.classList.remove('active');
                        currentActivePanel.style.opacity = '';
                        currentActivePanel.style.transform = '';
                        
                        // Show new panel after a brief delay
                        const activePanel = document.getElementById(tabId + '-section');
                        if (activePanel) {
                            activePanel.classList.add('active');
                            // Trigger reflow to ensure transition
                            activePanel.offsetHeight;
                            activePanel.style.opacity = '1';
                            activePanel.style.transform = 'translateY(0)';
                        }
                    }, 200);
                } else {
                    // If no active panel (initial load), just show the new one
                    const activePanel = document.getElementById(tabId + '-section');
                    if (activePanel) {
                        activePanel.classList.add('active');
                        activePanel.style.opacity = '1';
                        activePanel.style.transform = 'translateY(0)';
                    }
                }
                
                // Update button states with smooth transitions
                tabButtons.forEach(button => {
                    const isActive = button.getAttribute('data-tab') === tabId;
                    if (isActive) {
                        button.classList.add('active');
                        button.classList.remove('bg-secondary-100/80', 'dark:bg-secondary-800/80', 'text-secondary-700', 'dark:text-secondary-300', 'border');
                        button.classList.add('bg-gradient-to-r', 'from-primary-600', 'to-purple-600', 'text-white', 'shadow-glow');
                        // Add active dot indicator
                        const dot = button.querySelector('.active-dot');
                        if (dot) dot.style.opacity = '1';
                    } else {
                        button.classList.remove('active');
                        button.classList.remove('bg-gradient-to-r', 'from-primary-600', 'to-purple-600', 'text-white', 'shadow-glow');
                        button.classList.add('bg-secondary-100/80', 'dark:bg-secondary-800/80', 'text-secondary-700', 'dark:text-secondary-300', 'border', 'border-secondary-200/50', 'dark:border-secondary-700/50');
                        // Hide active dot indicator
                        const dot = button.querySelector('.active-dot');
                        if (dot) dot.style.opacity = '0';
                    }
                });
                
                // Update mobile indicator dots
                updateMobileDots(tabId);
            }
            
            // Update mobile indicator dots
            function updateMobileDots(activeTabId) {
                const tabs = ['profile', 'communication', 'appearance', 'districts'];
                const dotContainer = document.querySelector('.mobile-dots-container');
                if (!dotContainer) return;
                
                // Clear existing dots
                dotContainer.innerHTML = '';
                
                // Create new dots
                tabs.forEach((tab, index) => {
                    const dot = document.createElement('div');
                    dot.className = `w-2 h-2 rounded-full transition-all duration-300 ${tab === activeTabId ? 'bg-primary-500 scale-125' : 'bg-secondary-300 dark:bg-secondary-600'}`;
                    dotContainer.appendChild(dot);
                });
            }
            
            // Add click event to each tab button with ripple effect
            tabButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    const tabId = this.getAttribute('data-tab');
                    
                    // Create ripple effect
                    const ripple = document.createElement('span');
                    const rect = this.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    const x = e.clientX - rect.left - size / 2;
                    const y = e.clientY - rect.top - size / 2;
                    
                    ripple.style.cssText = `
                        position: absolute;
                        border-radius: 50%;
                        background: rgba(255, 255, 255, 0.7);
                        transform: scale(0);
                        animation: ripple 0.6s linear;
                        width: ${size}px;
                        height: ${size}px;
                        top: ${y}px;
                        left: ${x}px;
                        pointer-events: none;
                    `;
                    
                    this.appendChild(ripple);
                    
                    // Remove ripple after animation
                    setTimeout(() => {
                        ripple.remove();
                    }, 600);
                    
                    // Switch tab
                    switchTab(tabId);
                });
            });
            
            // Add CSS for ripple animation
            const style = document.createElement('style');
            style.textContent = `
                @keyframes ripple {
                    to {
                        transform: scale(4);
                        opacity: 0;
                    }
                }
                .mobile-dots-container {
                    display: flex;
                    justify-content: center;
                    gap: 0.5rem;
                    padding: 0.5rem 0;
                }
                .active-dot {
                    transition: opacity 0.3s ease;
                }
            `;
            document.head.appendChild(style);
            
            // Initialize with Profile tab active (default)
            setTimeout(() => switchTab('profile'), 100);
            
            // Auto-update mobile dots on resize
            window.addEventListener('resize', () => {
                const activeTab = document.querySelector('.tab-button.active');
                if (activeTab) {
                    const tabId = activeTab.getAttribute('data-tab');
                    updateMobileDots(tabId);
                }
            });
        });
    </script>
</body>
</html>
